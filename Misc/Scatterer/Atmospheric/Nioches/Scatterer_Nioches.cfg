@Scatterer_planetsList:AFTER[KephiaSystem]
{
    @scattererCelestialBodies
    {
        Item
        {
            celestialBodyName = Nioches
            transformName = Nioches
            loadDistance = 100000000
            unloadDistance = 20000000000
            hasOcean = False
            flatScaledSpaceModel = True
            usesCloudIntegration = False
            cloudIntegrationUsesScattererSunColors = False
            mainSunCelestialBody = Kephia A
            sunColor = 1.0,1.0,1.0
            sunsUseIntensityCurves = False
            eclipseCasters
            {
                Item = Chrostis
                Item = Phion
                Item = Zunk  // Nioches will cast eclipse shadows on Zunk
            }
        }
    }
}