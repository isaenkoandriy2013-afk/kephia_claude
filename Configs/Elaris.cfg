            displayName = Elaris^N
            description = Elaris is a slightly smaller than kerbin planet that has an atmosphere made of nitrogen and oxygen, but with traces of argon and other noble gases, so its breathable, but may have a hallucinogenic effect. The colour of the atmosphere i think would be blue, but a laythe blue so its like a little darker than kerbin. Elaris' crust is rich in silicon and oxidised metals (so it would have like a bluey saturated grey color like a sad depressing blue), and it would have plateaus forming around the planet. Elaris has very small oceans, but the oceans are made up of lots of minerals and gives it a funny colour. Sunsets on Elaris would be mainly orange, but the other gases in the atmosphere give it a slight pink hue. The weather on Elaris is generally calm around the equator, but it has major thunderstorms around the poles, with 200kmph winds and often some hurricanes. Elaris also maintains a stable -12 degrees throughout its 454 day years (also has 27 hour days). Elaris clouds around the equator how ever are mush like Teshyr -- thick, small and scattered, and it also often has some low-lying fog around coast-lines. (credits to Rσყαʅ)
